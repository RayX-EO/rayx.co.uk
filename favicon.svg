<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>RayX favicon — quiet optical mark</title>
  <defs>
    <linearGradient id="mainRay" x1="134" y1="390" x2="394" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D9DEE6" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#D9DEE6" stop-opacity="0.22"/>
      <stop offset="0.43" stop-color="#F5F7FA" stop-opacity="0.74"/>
      <stop offset="0.50" stop-color="#FFFFFF" stop-opacity="0.94"/>
      <stop offset="0.58" stop-color="#F5F7FA" stop-opacity="0.72"/>
      <stop offset="0.84" stop-color="#D9DEE6" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#D9DEE6" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="crossRay" x1="162" y1="154" x2="358" y2="356" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D9DEE6" stop-opacity="0"/>
      <stop offset="0.28" stop-color="#D9DEE6" stop-opacity="0.18"/>
      <stop offset="0.47" stop-color="#FFFFFF" stop-opacity="0.58"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.54"/>
      <stop offset="0.76" stop-color="#D9DEE6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#D9DEE6" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="overlapGlow" cx="258" cy="260" r="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.38"/>
      <stop offset="0.24" stop-color="#D9DEE6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#D9DEE6" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5.5"/>
    </filter>

    <linearGradient id="edge" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.015"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="#050B16"/>
  <rect x="1" y="1" width="510" height="510" rx="95" stroke="url(#edge)" stroke-width="2"/>

  <!-- A quieter optical field. No centre dot; the crossing creates the highlight. -->
  <circle cx="258" cy="260" r="86" fill="url(#overlapGlow)" filter="url(#soft)" opacity="0.64"/>

  <!-- Dominant ray: asymmetric, directional, and slightly smaller than before for more breathing room. -->
  <g filter="url(#soft)" opacity="0.18">
    <path d="M134 390 L243 268 L394 130 L275 250 Z" fill="#D9DEE6"/>
  </g>
  <path d="M134 390 L243 268 L394 130 L275 250 Z" fill="url(#mainRay)"/>

  <!-- Secondary ray: thinner and quieter, so the mark reads as a premium optical crossing rather than a hard X. -->
  <g filter="url(#soft)" opacity="0.10">
    <path d="M162 154 L248 245 L358 356 L262 268 Z" fill="#D9DEE6"/>
  </g>
  <path d="M162 154 L248 245 L358 356 L262 268 Z" fill="url(#crossRay)" opacity="0.88"/>

  <!-- Natural overlap highlight: tiny, soft, and derived from the crossing rather than a separate dot. -->
  <path d="M248 245 L275 250 L262 268 L243 268 Z" fill="#FFFFFF" opacity="0.54"/>
</svg>